<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Interstices — an interactive photography wall</title>
    <meta
      name="description"
      content="An interactive photography wall. Move your cursor and the wall parts; drop in your own photos and videos. A small, dependency-free web toy."
    />
    <meta name="theme-color" content="#0a0a0b" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Instrument+Serif:ital@0;1&family=Playfair+Display:wght@400;500;600&family=Shantell+Sans:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- the interactive canvas -->
    <section id="stage" aria-label="Interactive photography wall">
      <div id="wall"></div>

      <!-- legibility wash behind the intro copy -->
      <div class="wash" aria-hidden="true"></div>

      <!-- dim layer when a photo is focused — the wall stays visible behind -->
      <div id="scrim" aria-hidden="true"></div>

      <!-- one element for BOTH the hover preview and the in-frame focused view:
           on click it glides from the cursor to centre and grows in place, the
           wall dimming behind — never a separate full-screen overlay. -->
      <div id="preview" aria-hidden="true">
        <div class="pv-head">
          <button type="button" class="pv-nav pv-prev" aria-label="Previous photo"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7" /></svg></button>
          <span class="pv-headtext"><span class="pv-cat"></span><span class="pv-title"></span></span>
          <button type="button" class="pv-nav pv-next" aria-label="Next photo"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5l7 7-7 7" /></svg></button>
        </div>
        <div class="preview-media">
          <div class="preview-cap">
            <span class="preview-cat"></span>
            <span class="preview-label"></span>
          </div>
        </div>
        <div class="pv-foot">
          <span class="pv-meta"></span>
          <span class="pv-actions">
            <a class="pv-btn pv-download" aria-label="Download" title="Download" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v11" /><path d="M8 11l4 4 4-4" /><path d="M5 19h14" /></svg></a>
            <button type="button" class="pv-btn pv-close" aria-label="Close" title="Close"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" /></svg></button>
          </span>
        </div>
      </div>

      <!-- section intro, bottom-left -->
      <div id="intro">
        <h1 class="sr-only">Interstices</h1>
        <canvas id="logo" aria-hidden="true"></canvas>
        <p class="subtitle">
          Move your cursor to part the wall — click to open. Drop in your own
          photos or video; middle-drag to roam, scroll to zoom.
        </p>
      </div>
    </section>

    <!-- top-left controls -->
    <div id="tools">
      <button type="button" class="btn" id="upload" aria-label="Upload your own photos or videos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V4" /><path d="M8 8l4-4 4 4" /><path d="M5 15v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3" /></svg>
        <span class="label">Upload media</span>
      </button>
      <button type="button" class="btn ghost" id="reset" hidden>Reset</button>
      <input type="file" id="file" accept="image/*,video/*" multiple hidden />
    </div>

    <!-- top-right theme toggle -->
    <button type="button" id="theme" class="gh" aria-label="Toggle light / dark theme" title="Toggle theme">
      <svg class="ic-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 13.5A8 8 0 1 1 10.5 4a6.5 6.5 0 0 0 9.5 9.5Z" /></svg>
      <svg class="ic-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" /></svg>
    </button>

    <!-- bottom-right: credit + source link -->
    <div id="credits">
      <span class="credit">© 2026 Harshit Khemani · <a href="https://www.khe.money" target="_blank" rel="noopener noreferrer">khe.money</a> · v.2026.05</span>
      <a class="gh" href="https://github.com/HKTITAN/interstices" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub" title="View source on GitHub">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.57.1.78-.25.78-.55v-2c-3.2.7-3.88-1.37-3.88-1.37-.52-1.34-1.28-1.7-1.28-1.7-1.05-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.5 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.07.78 2.16v3.2c0 .31.21.66.79.55A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z" /></svg>
      </a>
    </div>

    <!-- drag-and-drop overlay -->
    <div id="drop" aria-hidden="true">
      <div class="drop-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3" /><circle cx="8.5" cy="9" r="1.6" /><path d="M21 15l-5-5-9 9" /></svg>
        <div class="drop-title">Drop to fill the wall</div>
        <div class="drop-sub">Images &amp; video · JPG · PNG · WEBP · GIF · MP4</div>
      </div>
    </div>

    <!-- onboarding: a hand-drawn wobble filter, a roaming finger, two doodle
         hints. Decorative + transient — the naive "brand layer" over a clean app. -->
    <svg width="0" height="0" aria-hidden="true" style="position: absolute">
      <filter id="wobble" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="4" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="4" />
      </filter>
    </svg>

    <!-- a friendly pointing hand that roams the wordmark, inviting the first
         cursor move: index finger up at left, folded knuckles + thumb at right -->
    <svg id="finger" viewBox="0 0 48 56" aria-hidden="true">
      <rect x="8" y="6" width="9" height="27" rx="4.5" />
      <circle cx="22" cy="26" r="5" />
      <circle cx="30" cy="27" r="5" />
      <circle cx="37" cy="30" r="4.5" />
      <rect x="9" y="28" width="32" height="22" rx="11" />
      <rect x="33" y="33" width="8" height="15" rx="4" transform="rotate(22 37 40)" />
    </svg>

    <!-- doodle → Upload -->
    <div id="hint-upload" class="hint" aria-hidden="true">
      <svg class="doodle" viewBox="0 0 130 76" width="130" height="76" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path class="draw d1" pathLength="1" d="M120 64 C76 72 32 56 16 24" />
        <path class="draw d2" pathLength="1" d="M16 24 L10 41" />
        <path class="draw d3" pathLength="1" d="M16 24 L33 27" />
      </svg>
      <span class="hint-note">your photos go here!</span>
    </div>

    <!-- doodle → GitHub source link -->
    <div id="hint-source" class="hint" aria-hidden="true">
      <svg class="doodle" viewBox="0 0 116 70" width="116" height="70" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path class="draw d1" pathLength="1" d="M6 8 C44 4 86 18 102 58" />
        <path class="draw d2" pathLength="1" d="M102 58 L86 53" />
        <path class="draw d3" pathLength="1" d="M102 58 L106 42" />
      </svg>
      <span class="hint-note">it's open source!</span>
    </div>

    <div id="toast" role="status"></div>

    <script src="/app.js"></script>
    <script src="/logo.js"></script>
  </body>
</html>
